<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Hope Trans Inc.</title>
    <meta name="description" content="Thank you for contacting Hope Trans Inc. We have received your freight quote request and will be in touch shortly." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy: #0a0f1e;
        --navy-mid: #0d1425;
        --navy-card: #111827;
        --gold: #c9a84c;
        --gold-light: #e8c96a;
        --white: #ffffff;
        --muted: #8b9ab5;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--navy);
        color: var(--white);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        overflow: hidden;
      }

      /* Subtle background glow */
      body::before {
        content: '';
        position: fixed;
        top: -30%;
        left: 50%;
        transform: translateX(-50%);
        width: 700px;
        height: 700px;
        background: radial-gradient(circle, rgba(201, 168, 76, 0.08) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        background: var(--navy-card);
        border: 1px solid rgba(201, 168, 76, 0.2);
        border-radius: 24px;
        padding: 3.5rem 3rem;
        max-width: 540px;
        width: 100%;
        text-align: center;
        box-shadow: 0 0 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.04);
        animation: fadeSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .checkmark-wrap {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: rgba(201, 168, 76, 0.1);
        border: 2px solid rgba(201, 168, 76, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
        animation: popIn 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes popIn {
        from { opacity: 0; transform: scale(0.5); }
        to   { opacity: 1; transform: scale(1); }
      }

      .checkmark-wrap svg {
        width: 42px;
        height: 42px;
      }

      .logo-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.6rem;
        margin-bottom: 2.5rem;
      }

      .logo-row img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
      }

      .logo-row span {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--white);
        letter-spacing: 0.02em;
      }

      h1 {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 0.75rem;
        line-height: 1.2;
        background: linear-gradient(135deg, var(--gold-light), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        font-size: 1.05rem;
        color: var(--muted);
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      .divider {
        width: 60px;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        margin: 0 auto 2.5rem;
        border-radius: 999px;
      }

      .info-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 0.75rem;
      }

      .info-row span:first-child {
        font-size: 1rem;
      }

      .info-row a {
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
      }

      .info-row a:hover {
        color: var(--gold-light);
      }

      .btn-home {
        display: inline-block;
        margin-top: 2.5rem;
        padding: 0.85rem 2.5rem;
        background: linear-gradient(135deg, var(--gold), #a8832e);
        color: var(--navy);
        font-size: 0.95rem;
        font-weight: 700;
        border-radius: 999px;
        text-decoration: none;
        letter-spacing: 0.03em;
        transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        box-shadow: 0 4px 24px rgba(201, 168, 76, 0.3);
      }

      .btn-home:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(201, 168, 76, 0.45);
        opacity: 0.92;
      }

      .footer-note {
        margin-top: 3rem;
        font-size: 0.8rem;
        color: rgba(139, 154, 181, 0.5);
      }

      @media (max-width: 480px) {
        .card {
          padding: 2.5rem 1.5rem;
        }
        h1 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Logo -->
      <div class="logo-row">
        <img src="/logo.jpeg" alt="Hope Trans Inc." />
        <span>Hope Trans Inc.</span>
      </div>

      <!-- Checkmark icon -->
      <div class="checkmark-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>

      <!-- Heading -->
      <h1>Quote Request Received!</h1>
      <p class="subtitle">
        Thank you for reaching out to Hope Trans Inc.<br />
        Our team will review your request and get back to you within <strong style="color: #e8c96a;">24 hours</strong>.
      </p>

      <div class="divider"></div>

      <!-- Contact info -->
      <div class="info-row">
        <span>📞</span>
        <a href="tel:+19057959292">+1 905 795 9292</a>
      </div>
      <div class="info-row">
        <span>✉️</span>
        <a href="mailto:info@hopetransinc.com">info@hopetransinc.com</a>
      </div>
      <div class="info-row">
        <span>📍</span>
        <span>Mississauga, Ontario, Canada</span>
      </div>

      <!-- Back button -->
      <a href="/" class="btn-home">← Back to Home</a>
    </div>

    <p class="footer-note">© 2026 Hope Trans Inc. All rights reserved.</p>
  </body>
</html>
